<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 售后订单管理系统</title>
  <link rel="stylesheet" href="/static/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="/static/plugins/fontawesome-free/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }
    body.login-page {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .login-box {
      width: 400px;
      max-width: 92%;
      animation: fadeInDown 0.6s ease;
    }
    /* 卡片上浮微动效 */
    .card {
      transition: transform 0.3s ease;
    }
    .login-box:hover .card {
      transform: translateY(-4px);
    }
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.7rem;
      color: rgba(255,255,255,0.85);
    }
    .login-logo b {
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .card {
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.22);
      border: none;
      /* 毛玻璃效果 */
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .login-card-body {
      padding: 2.2rem 2.6rem;
    }
    .login-box-msg {
      color: #555;
      font-size: 1rem;
      margin-bottom: 1.6rem;
      text-align: center;
    }
    /* 输入框全局美化 */
    .form-control {
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      transition: all 0.28s ease;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.18);
    }
    .input-group {
      margin-bottom: 1rem !important;
    }
    .input-group .form-control {
      border-right: 0;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }
    .input-group .input-group-append .input-group-text {
      background: #ffffff;
      border-left: 0;
      color: #aaa;
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
      transition: color 0.28s;
    }
    .input-group:focus-within .input-group-text {
      color: #667eea;
    }
    .btn-primary {
      background: linear-gradient(to right, #667eea, #764ba2);
      border: none;
      padding: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s;
      border-radius: 10px;
      font-size: 1.05rem;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(102,126,234,0.42);
      background: linear-gradient(to right, #5a6fd6, #6a4398);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .alert {
      border-radius: 10px;
      font-size: 0.9rem;
    }
    /* 记住我复选框 */
    .icheck-primary {
      margin-bottom: 1rem;
    }
    /* 底部版权文字 */
    .copyright-tip {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body class="login-page">
<div class="login-box">
  <div class="login-logo">
    <b>售后订单</b>管理系统
  </div>
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg"><i class="fas fa-lock mr-2"></i>请输入账号密码登录系统</p>
      {% if error %}
      <div class="alert alert-danger p-2 mb-4">
        <i class="fas fa-exclamation-triangle mr-1"></i>{{ error }}
      </div>
      {% endif %}
      <form method="post">
        <!-- CSRF 保护 -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="input-group">
          <input type="text" class="form-control" name="username" placeholder="用户名" required autofocus>
          <div class="input-group-append">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
          </div>
        </div>
        <div class="input-group">
          <input type="password" class="form-control" name="password" placeholder="密码" required>
          <div class="input-group-append">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
          </div>
        </div>

        <!-- 新增记住我 -->
        <div class="icheck-primary">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">记住登录状态</label>
        </div>

        <div class="row mt-2">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="copyright-tip">
    © 2026 售后订单管理系统 All Rights Reserved
  </div>
</div>

<script src="/static/plugins/jquery/jquery.min.js"></script>
<script src="/static/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
$(function(){
    // 回车提交表单
    $('form').on('keydown', 'input', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            $('form').submit();
        }
    });
    // 自动清除错误提示（输入时）
    $('input').on('input', function(){
        $('.alert-danger').fadeOut(300);
    })
});
</script>
</body>
</html>
