{% extends "admin_base.html" %}
{% block title %}扫码管理{% endblock %}

{% block content %}
<!-- 统计卡片 -->
<div class="row">
    <div class="col-md-4">
        <div class="info-box bg-info">
            <span class="info-box-icon"><i class="fas fa-qrcode"></i></span>
            <div class="info-box-content">
                <span class="info-box-text">今日已扫</span>
                <span class="info-box-number" id="todayCount">0</span>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="info-box bg-success">
            <span class="info-box-icon"><i class="fas fa-calendar-alt"></i></span>
            <div class="info-box-content">
                <span class="info-box-text">本月已扫</span>
                <span class="info-box-number" id="monthCount">0</span>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="info-box bg-warning">
            <span class="info-box-icon"><i class="fas fa-database"></i></span>
            <div class="info-box-content">
                <span class="info-box-text">历史总计</span>
                <span class="info-box-number" id="totalCount">0</span>
            </div>
        </div>
    </div>
</div>

<!-- 手动添加 / 后台监听状态 -->
<div class="card">
    <div class="card-header py-2">
        <h3 class="card-title m-0">手动添加 / 后台监听状态</h3>
    </div>
    <div class="card-body">
        <div class="form-inline mb-2">
            <input type="text" id="manualCode" class="form-control form-control-sm mr-2" placeholder="输入单号">
            <button class="btn btn-primary btn-sm mr-2" onclick="manualScan()"><i class="fas fa-plus"></i> 添加</button>
            <span class="badge badge-success" id="listenerStatus">🔊 后台监听运行中</span>
        </div>
        <button class="btn btn-outline-success btn-sm" data-toggle="collapse" data-target="#batchImportPanel">
            <i class="fas fa-upload mr-1"></i>批量导入测试单号
        </button>
                <button class="btn btn-outline-info btn-sm" onclick="syncLogs()" title="从日志文件同步单号">
            <i class="fas fa-sync-alt mr-1"></i>同步历史单号
        </button>
        <button class="btn btn-outline-warning btn-sm" onclick="fixOrderTime()" title="修复缺失的订单时间">
            <i class="fas fa-wrench mr-1"></i>修复订单时间
        </button>
        <div class="collapse mt-2" id="batchImportPanel">
            <div class="bg-light p-2 rounded">
                <div class="form-group">
                    <label>上传文本文件（.txt）</label>
                    <input type="file" id="importFile" accept=".txt" class="form-control-file">
                </div>
                <div class="form-group">
                    <label>或粘贴内容（每行一个单号）</label>
                    <textarea id="importText" class="form-control" rows="4" placeholder="粘贴单号，每行一个"></textarea>
                </div>
                <button class="btn btn-primary btn-sm" onclick="importCodes()"><i class="fas fa-check mr-1"></i>确认导入</button>
            </div>
        </div>
    </div>
</div>

<!-- 今日扫码记录 -->
<div class="card">
    <div class="card-header py-2">
        <h3 class="card-title m-0">今日扫码记录</h3>
    </div>
    <div class="card-body p-2">
        <table class="table table-sm table-bordered table-hover">
            <thead class="bg-light">
                <tr><th>单号</th><th>时间</th><th width="80">操作</th></tr>
            </thead>
            <tbody id="todayTable">
                <tr><td colspan="3" class="text-center text-muted">加载中...</td></tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-center mt-1">
            <ul class="pagination pagination-sm mb-0" id="todayPagination"></ul>
        </div>
    </div>
</div>

<!-- 历史查询 -->
<div class="card">
    <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <h3 class="card-title m-0">历史查询</h3>
        <div class="form-inline">
            <input type="date" id="queryDate" class="form-control form-control-sm mr-2">
            <input type="text" id="queryCode" class="form-control form-control-sm mr-2" placeholder="单号模糊搜索">
            <button class="btn btn-primary btn-sm mr-2" onclick="loadHistory()"><i class="fas fa-search"></i> 查询</button>
            <button class="btn btn-success btn-sm" onclick="batchQuery()"><i class="fas fa-file-excel"></i> 导出匹配订单</button>
            <button class="btn btn-warning btn-sm" onclick="batchMatch()"><i class="fas fa-search-dollar"></i> 批量匹配导出</button>
            <button class="btn btn-danger btn-sm" onclick="monthlyImport()"><i class="fas fa-cloud-upload-alt"></i> 全月匹配导入</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="refreshExcel()"><i class="fas fa-sync-alt"></i> 刷新Excel缓存</button>
        </div>
    </div>
    <div class="card-body p-2">
        <table class="table table-sm table-bordered table-hover">
            <thead class="bg-light">
                <tr><th>单号</th><th>扫码时间</th><th>来源</th></tr>
            </thead>
            <tbody id="historyTable">
                <tr><td colspan="3" class="text-center text-muted">请输入条件查询</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 扫码趋势图 -->
<div class="card">
    <div class="card-header py-2">
        <h3 class="card-title m-0">近7天扫码趋势</h3>
    </div>
    <div class="card-body p-2">
        <canvas id="dailyTrendChart" height="200"></canvas>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
// 确保有获取 CSRF token 的函数（兼容全局设置）
function getCsrfToken() {
    if (window.csrftoken) return window.csrftoken;
    // fallback: from cookie
    let value = "; " + document.cookie;
    let parts = value.split("; csrf_token=");
    if (parts.length === 2) return parts.pop().split(";").shift();
    return '';
}

let currentTodayPage = 1;

// ========== 手动添加 ==========
function manualScan() {
    const code = $('#manualCode').val().trim();
    if (!code) return showWarning('请输入单号');
    $.post('/api/scanner/scan', {code: code}, function(res) {
        if (res.success) {
            showSuccess(res.msg);
            $('#manualCode').val('');
            loadStats();
            loadToday(1);
        } else if (res.repeat) {
            showWarning(res.msg);
        } else {
            showError(res.msg);
        }
    });
}

// ========== 统计 ==========
function loadStats() {
    $.getJSON('/api/scanner/stats', function(data) {
        $('#todayCount').text(data.today);
        $('#monthCount').text(data.month);
        $('#totalCount').text(data.total);
    });
}

// ========== 今日记录分页 ==========
function loadToday(page) {
    currentTodayPage = page || 1;
    $.getJSON('/api/scanner/today-page', {page: currentTodayPage, per_page: 15}, function(res) {
        let html = '';
        if (res.data.length === 0) {
            html = '<tr><td colspan="3" class="text-center text-muted">暂无记录</td></tr>';
        } else {
            res.data.forEach(item => {
                html += `<tr>
                    <td><a href="/detail?order_code=${item.code}" target="_blank">${item.code}</a></td>
                    <td>${item.time}</td>
                    <td><button class="btn btn-danger btn-xs" onclick="deleteCode('${item.code}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
        }
        $('#todayTable').html(html);
        renderTodayPagination(res.page, res.total_pages);
    });
}

function renderTodayPagination(page, totalPages) {
    if (totalPages <= 1) { $('#todayPagination').html(''); return; }
    let html = '';
    html += `<li class="page-item ${page===1?'disabled':''}"><a class="page-link" href="#" onclick="loadToday(${page-1})">&laquo;</a></li>`;
    const max = 5;
    let start = Math.max(1, page - Math.floor(max/2));
    let end = Math.min(totalPages, start + max - 1);
    if (end - start + 1 < max) start = Math.max(1, end - max + 1);
    if (start > 1) { html += `<li class="page-item"><a class="page-link" href="#" onclick="loadToday(1)">1</a></li>`; if (start>2) html += '<li class="page-item disabled"><span class="page-link">...</span></li>'; }
    for (let i = start; i <= end; i++) {
        html += `<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="loadToday(${i})">${i}</a></li>`;
    }
    if (end < totalPages) { if (end < totalPages-1) html += '<li class="page-item disabled"><span class="page-link">...</span></li>'; html += `<li class="page-item"><a class="page-link" href="#" onclick="loadToday(${totalPages})">${totalPages}</a></li>`; }
    html += `<li class="page-item ${page===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="loadToday(${page+1})">&raquo;</a></li>`;
    $('#todayPagination').html(html);
}

// ========== 删除 ==========
function deleteCode(code) {
    if (!confirm('确定删除 ' + code + ' ?')) return;
    $.ajax({
        url: '/api/scanner/delete/' + code,
        method: 'DELETE',
        success: function(res) {
            if (res.success) { showSuccess(res.msg); loadStats(); loadToday(currentTodayPage); }
            else showError(res.msg);
        }
    });
}

// ========== 批量导入 ==========
function importCodes() {
    const file = $('#importFile')[0].files[0];
    const text = $('#importText').val().trim();
    if (!file && !text) return showWarning('请选择文件或粘贴文本');

    const formData = new FormData();
    if (file) formData.append('file', file);
    if (text) formData.append('text', text);

    $.ajax({
        url: '/api/scanner/import-codes',
        method: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.success) {
                showSuccess(res.msg);
                $('#importFile').val('');
                $('#importText').val('');
                loadStats();
                loadToday(1);
            } else {
                showError(res.msg);
            }
        },
        error: function() { showError('导入失败'); }
    });
}

// ========== 历史查询 ==========
function loadHistory() {
    const date = $('#queryDate').val();
    const code = $('#queryCode').val().trim();
    $.getJSON('/api/scanner/query', {date: date, code: code}, function(data) {
        let html = '';
        if (data.length === 0) {
            html = '<tr><td colspan="3" class="text-center text-muted">无结果</td></tr>';
        } else {
            data.forEach(item => {
                html += `<tr><td>${item.code}</td><td>${item.time}</td><td>${item.source}</td></tr>`;
            });
        }
        $('#historyTable').html(html);
    });
}

// ========== 批量导出匹配订单 (表单提交，需 CSRF) ==========
function batchQuery() {
    const date = $('#queryDate').val();
    if (!date) return showWarning('请先选择日期');
    const token = getCsrfToken();
    const form = $('<form method="POST" action="/api/scanner/batch-query">' +
        '<input type="hidden" name="csrf_token" value="' + token + '">' +
        '<input type="hidden" name="date" value="' + date + '">' +
        '</form>');
    $('body').append(form);
    form.submit();
    form.remove();
}

// ========== 批量匹配导出 ==========
function batchMatch() {
    const date = $('#queryDate').val();
    if (!date) return showWarning('请先选择日期');
    const token = getCsrfToken();
    const form = $('<form method="POST" action="/api/scanner/batch_match">' +
        '<input type="hidden" name="csrf_token" value="' + token + '">' +
        '<input type="hidden" name="date" value="' + date + '">' +
        '</form>');
    $('body').append(form);
    form.submit();
    form.remove();
}

// ========== 全月匹配导入 ==========
function monthlyImport() {
    if (!confirm('确认对当月所有扫描单号进行匹配并导入数据库？此操作可能较耗时。')) return;

    showInfo('正在执行全月匹配导入，请稍候...');
    $.post('/api/scanner/monthly-match-import', function(res) {
        if (res.success) {
            showSuccess(res.msg);
        } else {
            showError(res.msg);
        }
    }).fail(function() { showError('请求失败'); });
}

// ========== 刷新 Excel 缓存 ==========
function refreshExcel() {
    $.post('/api/scanner/refresh-excel', function(res) {
        if (res.success) {
            showSuccess(res.msg);
        } else {
            showError(res.msg);
        }
    });
}
function syncLogs() {
    if (!confirm('将从日志文件（scan_logs）中同步历史单号到数据库，可能需要一些时间，是否继续？')) return;
    showInfo('正在同步历史单号，请稍候...');
    $.post('/api/scanner/sync-logs', function(res) {
        if (res.success) {
            showSuccess(res.msg);
            loadStats();
            loadToday(1);
        } else {
            showError(res.msg);
        }
    }).fail(function() {
        showError('同步请求失败');
    });
}
// ========== 扫码趋势图 ==========
function loadDailyTrend() {
    $.getJSON('/api/scanner/daily-trend', {days: 7}, function(data) {
        const ctx = document.getElementById('dailyTrendChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.days,
                datasets: [{
                    label: '扫码数量',
                    data: data.counts,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    });
}

// ========== 定时轮询 ==========
let pollTimer = setInterval(function() {
    loadStats();
    loadToday(currentTodayPage);
}, 3000);

$(window).on('beforeunload', function() {
    clearInterval(pollTimer);
});

// ========== 初始化 ==========
$(function() {
    loadStats();
    loadToday(1);
    loadDailyTrend();
});

function fixOrderTime() {
    if (!confirm('将用扫码时间填充所有缺失的订单时间，是否继续？')) return;
    $.post('/api/scanner/fix-order-time', function(res) {
        if (res.success) showSuccess(res.msg);
        else showError(res.msg);
    });
}
</script>
{% endblock %}
