<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}售后订单管理系统{% endblock %}</title>
  <!-- 样式表 -->
  <link rel="stylesheet" href="/static/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="/static/plugins/toastr/toastr.min.css">
  <link rel="stylesheet" href="/static/plugins/fontawesome-free/css/all.min.css">
  <script src="/static/plugins/chart.js/chart.min.js"></script>

  <style>
    @media (max-width: 768px) {
      .info-box { min-height: 60px; }
      .info-box-icon { width: 60px; height: 60px; line-height: 60px; font-size: 1.2rem; }
      .info-box-content { padding: 5px 5px; }
      .btn-group-sm .btn i { margin-right: 0 !important; }
      .btn-group-sm .btn span.text { display: none; }
    }
  </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <!-- 顶部导航栏 -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item dropdown">
        <a class="nav-link" data-toggle="dropdown" href="#">
          <i class="fas fa-user"></i>
          <span class="d-none d-md-inline">{{ current_user.username }}</span>
        </a>
        <div class="dropdown-menu dropdown-menu-right">
          <a href="/logout" class="dropdown-item">
            <i class="fas fa-sign-out-alt mr-1"></i> 登出
          </a>
        </div>
      </li>
    </ul>
  </nav>

  <!-- 左侧侧边菜单 -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <div class="user-panel mt-3 pb-3 mb-3 d-flex">
      <div class="info">
        <a href="#" class="d-block">{{ current_user.username }}</a>
      </div>
    </div>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column">
          <li class="nav-item"><a href="/" class="nav-link"><i class="nav-icon fas fa-list"></i><p>订单列表</p></a></li>
          <li class="nav-item"><a href="/goods-summary" class="nav-link"><i class="nav-icon fas fa-box"></i><p>商品汇总</p></a></li>
          <li class="nav-item"><a href="/set-summary" class="nav-link"><i class="nav-icon fas fa-cubes"></i><p>套装汇总</p></a></li>
          <li class="nav-item"><a href="/goods-lib" class="nav-link"><i class="nav-icon fas fa-book"></i><p>商品档案管理</p></a></li>
          <li class="nav-item"><a href="/goods-set-lib" class="nav-link"><i class="nav-icon fas fa-archive"></i><p>套装档案管理</p></a></li>
          <li class="nav-item">
            <a href="/scanner" class="nav-link">
                <i class="nav-icon fas fa-qrcode"></i>
                <p>扫码管理</p>
            </a>
        </li>
          <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="nav-icon fas fa-chart-bar"></i><p>数据分析</p></a></li>
          <li class="nav-item"><a href="/operation-log" class="nav-link"><i class="nav-icon fas fa-history"></i><p>操作日志</p></a></li>
          {% if current_user.role == 'admin' %}
          <li class="nav-item"><a href="/users" class="nav-link"><i class="nav-icon fas fa-users"></i><p>用户管理</p></a></li>
          {% endif %}
        </ul>
      </nav>
    </div>
  </aside>

  <!-- 页面主体内容区域 -->
  <div class="content-wrapper">
    <section class="content pt-3">
      {% block content %}{% endblock %}
    </section>
  </div>
</div>

<!-- JS 脚本（严格按顺序） -->
<script src="/static/plugins/jquery/jquery.min.js"></script>
<!-- CSRF 统一设置脚本（必须在 jQuery 之后，其他业务脚本之前） -->
<script src="/static/js/csrf_setup.js"></script>
<script src="/static/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/static/plugins/toastr/toastr.min.js"></script>
<script src="/static/dist/js/adminlte.min.js"></script>

<script>
// toastr 等辅助函数
window.showSuccess = function(msg) {
    if (typeof toastr !== 'undefined') toastr.success(msg, '成功');
    else alert(msg);
};
window.showError = function(msg) {
    if (typeof toastr !== 'undefined') toastr.error(msg || '操作失败', '错误');
    else alert(msg);
};
window.showWarning = function(msg) {
    if (typeof toastr !== 'undefined') toastr.warning(msg, '警告');
    else alert(msg);
};
window.showInfo = function(msg) {
    if (typeof toastr !== 'undefined') toastr.info(msg, '提示');
    else alert(msg);
};

window.setButtonLoading = function(btn, loading) {
    if (loading) {
        btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-1"></i>' + (btn.data('loading-text') || '处理中...'));
    } else {
        btn.prop('disabled', false).html(btn.data('original-html'));
    }
};

$(function(){
    if (typeof toastr === 'undefined') console.error('toastr 未加载！');
});
</script>

{% block script %}{% endblock %}
</body>
</html>
